name: Auto Generate Journal Feed
on:
  push:
    paths:
      - 'diary/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Scan Files and Build Feed
        run: |
          echo "[" > feed.json
          first=true
          
          # Move directly into the diary directory so filenames don't save with a prefix path
          cd diary
          
          for file in $(ls -r *.md 2>/dev/null); do
            filename=$(basename "$file")
            
            # Extract date components assuming YYYY-MM-DD.md format
            year=$(echo "$filename" | cut -d'-' -f1)
            month_num=$(echo "$filename" | cut -d'-' -f2)
            day=$(echo "$filename" | cut -d'-' -f3 | cut -d'.' -f1)
            
            # Map month numbers cleanly to standard calendar strings
            case "$month_num" in
              01) month="January" ;;
              02) month="February" ;;
              03) month="March" ;;
              04) month="April" ;;
              05) month="May" ;;
              06) month="June" ;;
              07) month="July" ;;
              08) month="August" ;;
              09) month="September" ;;
              10) month="October" ;;
              11) month="November" ;;
              12) month="December" ;;
            esac
            
            # Extract custom layout sentiment tag values from within the front matter if specified
            sentiment="Logged"
            if grep -q "sentiment:" "$filename"; then
              sentiment=$(grep "sentiment:" "$filename" | head -n 1 | cut -d':' -f2- | xargs)
            fi

            # Step back out to repo root momentarily to append to the root feed.json
            cd ..

            if [ "$first" = true ]; then
              first=false
            else
              echo "," >> feed.json
            fi
            
            echo "  {\"filename\": \"$filename\", \"year\": \"$year\", \"month\": \"$month\", \"day\": \"$day\", \"sentiment\": \"$sentiment\"}" >> feed.json
            
            # Go back into the diary directory for the next iteration of the loop run
            cd diary
          done
          
          # Return back out to repository root space to finalize file parameters safely
          cd ..
          echo "]" >> feed.json

      - name: Commit and Push Updated Feed
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add feed.json
          
          # Only commit and push if the feed file actually changed to avoid infinite run tracking loops
          git diff-index --quiet HEAD || git commit -m "Automated feed sync [skip ci]" && git push
