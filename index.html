<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unified Market Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #f1f5f9;
            --sidebar-bg: #1e293b;
            --sidebar-text: #cbd5e1;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --card-bg: #ffffff;
            --accent-blue: #3b82f6;
            --accent-purple: #a855f7;
            --border-color: #cbd5e1;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            overflow: hidden; /* Prevents the whole browser window from scrolling */
        }

        .dashboard-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* --- 3-SECTION APP LAYOUT SYSTEM --- */
        .sidebar-left {
            width: 240px;
            background-color: var(--sidebar-bg);
            color: var(--sidebar-text);
            padding: 20px 15px;
            overflow-y: auto; /* Sidebars scroll independently if menus get too long */
            flex-shrink: 0;
            border-right: 1px solid #334155;
            height: 100vh;
            box-sizing: border-box;
        }

        .main-workspace-center {
            flex: 1;
            display: flex;
            flex-direction: column; /* Stacks header vertically above the scroll body */
            height: 100vh;
            overflow: hidden; /* Keeps the outer wrapper completely frozen */
        }

        .sidebar-right {
            width: 240px;
            background-color: var(--sidebar-bg);
            color: var(--sidebar-text);
            padding: 20px 15px;
            overflow-y: auto;
            flex-shrink: 0;
            border-left: 1px solid #334155;
            height: 100vh;
            box-sizing: border-box;
        }

        /* --- STICKY TOP HEADER ZONE --- */
        .journal-header {
            padding: 30px 40px 15px 40px;
            background-color: var(--bg-color); /* Matches workspace backplate color */
            border-bottom: 2px solid #cbd5e1;
            flex-shrink: 0; /* Prevents header section from shrinking down */
            z-index: 10;
            transition: border-color 0.3s ease;
        }

        .journal-header h1 {
            margin: 0;
            color: var(--text-main);
            font-size: 1.8rem;
        }

        .subtitle {
            margin: 5px 0 0 0;
            font-size: 1rem;
            font-weight: 600;
            font-style: italic;
        }

        /* --- INDEPENDENT MAIN BODY SCROLL ZONE --- */
        .scrollable-body-container {
            flex: 1;
            padding: 25px 40px 40px 40px;
            overflow-y: auto; /* ONLY this container will scroll up and down */
            box-sizing: border-box;
        }

        /* --- CARDS & MARKDOWN MARKUP LAYOUT --- */
        .sidebar-header {
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #94a3b8;
            margin-bottom: 20px;
            border-bottom: 1px solid #334155;
            padding-bottom: 10px;
        }

        .content-card-body {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
            min-height: 200px;
            margin-bottom: 20px;
        }

        .entry-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .entry-header h2 { margin: 0; color: #1e293b; font-size: 1.4rem; }

        .sentiment-badge {
            padding: 4px 14px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.8rem;
        }

        .badge-diary { background: #dcfce7; color: #166534; }
        .badge-note { background: #f3e8ff; color: #6b21a8; }

        .rendered-markdown {
            line-height: 1.8;
            color: #334155;
            font-size: 1.05rem;
        }

        .rendered-markdown p { margin-bottom: 20px; }
        .rendered-markdown h3 { color: var(--text-muted); font-size: 0.9rem; text-transform: uppercase; margin-top: 30px; margin-bottom: 10px; font-weight: bold; }
        .rendered-markdown img { max-width: 100%; height: auto; border-radius: 8px; margin: 20px 0; display: block; border: 1px solid var(--border-color); }

        /* --- TREE SELECTION NAVIGATION --- */
        .tree-item {
            cursor: pointer;
            padding: 8px 10px;
            border-radius: 6px;
            display: block;
            margin-bottom: 4px;
            transition: background 0.2s, color 0.2s;
            user-select: none;
            font-size: 0.9rem;
            text-decoration: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tree-item:hover { background-color: #334155; color: #fff; }

        .year-level { font-weight: bold; color: #fff; }
        .month-level { padding-left: 15px; color: #94a3b8; }
        .date-level { padding-left: 25px; color: #38bdf8; }
        .note-level { color: #e9d5ff; }
        
        .date-level.active-link { background-color: var(--accent-blue); color: white !important; font-weight: bold; }
        .note-level.active-link { background-color: var(--accent-purple); color: white !important; font-weight: bold; }

        .arrow { display: inline-block; font-size: 0.7rem; margin-right: 5px; transition: transform 0.2s; }
        .hidden { display: none; }
        .expanded > .arrow { transform: rotate(90deg); }
        .nested-group { padding-left: 5px; }
    </style>
</head>
<body>

<div class="dashboard-container">
    
    <aside class="sidebar-left">
        <div class="sidebar-header">Log Archive</div>
        <div id="logTree"></div>
    </aside>

    <main class="main-workspace-center">
        <header class="journal-header" id="dynamic-header-area">
            <h1 id="main-title-text">Market Sentiment & Strategy Log</h1>
            <p class="subtitle" id="subtitle-text" style="color: #eab308;">There are two types to traders, those who manage risk, and those wo don't and eventually blow up. End of story.</p>
        </header>
        
        <div class="scrollable-body-container">
            <div id="unified-display-view"></div>
        </div>
    </main>

    <aside class="sidebar-right">
        <div class="sidebar-header">Study Reference Notes</div>
        <div id="notesTree"></div>
    </aside>

</div>

<script>
    const monthOrder = {
        "January": 1, "February": 2, "March": 3, "April": 4, "May": 5, "June": 6,
        "July": 7, "August": 8, "September": 9, "October": 10, "November": 11, "December": 12
    };

    let logNodeRegistry = {};
    let noteNodeRegistry = {};

    async function initWorkspace() {
        try {
            const res = await fetch('feed.json?t=' + Date.now());
            const logs = await res.json();
            buildLogTree(logs);
            if (logs.length > 0) fetchAndRenderLog(logs[0]);
        } catch (e) {
            document.getElementById('unified-display-view').innerHTML = "<p style='color:red; padding: 20px;'>Initializing server feed configurations...</p>";
        }

        try {
            const res = await fetch('notes-feed.json?t=' + Date.now());
            const notes = await res.json();
            buildNotesTree(notes);
        } catch (e) {
            console.log("Notes feed currently empty.");
        }
    }

    function buildLogTree(logs) {
        const container = document.getElementById('logTree');
        let dataStructure = {};
        logNodeRegistry = {};

        logs.forEach((log, idx) => {
            const dayNum = parseInt(log.day, 10);
            if (!dataStructure[log.year]) dataStructure[log.year] = {};
            if (!dataStructure[log.year][log.month]) dataStructure[log.year][log.month] = [];
            dataStructure[log.year][log.month].push({ ...log, day: dayNum, registryIndex: idx });
        });

        container.innerHTML = '';
        Object.keys(dataStructure).sort((a, b) => b - a).forEach((year, yIdx) => {
            const yearId = `log-year-${year}`;
            const header = document.createElement('div');
            header.className = 'tree-item year-level' + (yIdx === 0 ? ' expanded' : '');
            header.innerHTML = `<span class="arrow">▶</span> <strong>${year}</strong>`;
            header.onclick = () => toggleView(yearId, header);
            container.appendChild(header);

            const group = document.createElement('div');
            group.id = yearId;
            group.className = yIdx === 0 ? 'nested-group' : 'nested-group hidden';

            Object.keys(dataStructure[year]).sort((a, b) => monthOrder[a] - monthOrder[b]).forEach((month, mIdx) => {
                const monthId = `log-month-${year}-${month}`;
                const mHeader = document.createElement('div');
                mHeader.className = 'tree-item month-level' + (yIdx === 0 && mIdx === 0 ? ' expanded' : '');
                mHeader.innerHTML = `<span class="arrow">▶</span> ${month}`;
                mHeader.onclick = (e) => { e.stopPropagation(); toggleView(monthId, mHeader); };
                group.appendChild(mHeader);

                const mGroup = document.createElement('div');
                mGroup.id = monthId;
                mGroup.className = (yIdx === 0 && mIdx === 0) ? 'nested-group' : 'nested-group hidden';

                dataStructure[year][month].sort((a, b) => a.day - b.day).forEach(post => {
                    const link = document.createElement('div');
                    link.className = 'tree-item date-level';
                    const nodeKey = `log-node-${post.registryIndex}`;
                    link.id = nodeKey;
                    logNodeRegistry[post.filename] = nodeKey;
                    
                    const formattedDay = post.day < 10 ? '0' + post.day : post.day;
                    link.innerHTML = `📅 Day ${formattedDay}`;
                    link.onclick = (e) => { e.stopPropagation(); fetchAndRenderLog(post); };
                    mGroup.appendChild(link);
                });
                group.appendChild(mGroup);
            });
            container.appendChild(group);
        });
    }

    async function fetchAndRenderLog(logItem) {
        document.getElementById('dynamic-header-area').style.borderBottomColor = "#cbd5e1";
        document.getElementById('main-title-text').innerText = "Market Sentiment & Strategy Log";
        document.getElementById('main-title-text').style.color = "var(--text-main)";
        document.getElementById('subtitle-text').innerText = "I am the best trader";
        document.getElementById('subtitle-text').style.color = "#eab308";

        const container = document.getElementById('unified-display-view');
        container.innerHTML = "<p style='padding: 20px;'>Loading log content...</p>";
        
        try {
            const res = await fetch(`https://raw.githubusercontent.com/accypriyesh/accypriyesh.github.io/main/diary/${logItem.filename}?t=` + Date.now());
            let text = await res.text();
            if (text.trim().startsWith('---')) text = text.replace(/^---[\s\S]*?---/, '');

            container.innerHTML = `
                <article class="content-card-body" style="border-top: 4px solid var(--accent-blue);">
                    <div class="entry-header">
                        <h2>${logItem.month} ${logItem.day}, ${logItem.year}</h2>
                        <span class="sentiment-badge badge-diary">${logItem.sentiment || 'Logged'}</span>
                    </div>
                    <div class="rendered-markdown">${marked.parse(text)}</div>
                </article>
            `;
            
            document.querySelectorAll('.tree-item').forEach(el => el.classList.remove('active-link'));
            const target = document.getElementById(logNodeRegistry[logItem.filename]);
            if (target) target.classList.add('active-link');
            
            // Auto reset scrollbar back to absolute top on note reload selection change
            document.querySelector('.scrollable-body-container').scrollTop = 0;
        } catch (e) { container.innerHTML = `<p style="color:red; padding: 20px;">Error retrieving target log file entry.</p>`; }
    }

    function buildNotesTree(notes) {
        const container = document.getElementById('notesTree');
        container.innerHTML = '';
        noteNodeRegistry = {};

        notes.forEach((note, idx) => {
            const link = document.createElement('div');
            link.className = 'tree-item note-level';
            const nodeKey = `note-node-${idx}`;
            link.id = nodeKey;
            noteNodeRegistry[note.filename] = nodeKey;
            
            link.innerHTML = `📝 ${note.title}`;
            link.onclick = () => fetchAndRenderNote(note);
            container.appendChild(link);
        });
    }

    async function fetchAndRenderNote(noteItem) {
        document.getElementById('dynamic-header-area').style.borderBottomColor = "#e9d5ff";
        document.getElementById('main-title-text').innerText = "Technical Core Studies";
        document.getElementById('main-title-text').style.color = "#581c87";
        document.getElementById('subtitle-text').innerText = "Structured Reference Library";
        document.getElementById('subtitle-text').style.color = "var(--accent-purple)";

        const container = document.getElementById('unified-display-view');
        container.innerHTML = "<p style='padding: 20px;'>Loading reference file...</p>";
        
        try {
            const res = await fetch(`https://raw.githubusercontent.com/accypriyesh/accypriyesh.github.io/main/notes/${noteItem.filename}?t=` + Date.now());
            let text = await res.text();
            if (text.trim().startsWith('---')) text = text.replace(/^---[\s\S]*?---/, '');

            container.innerHTML = `
                <article class="content-card-body" style="border-top: 4px solid var(--accent-purple);">
                    <div class="entry-header">
                        <h2>${noteItem.title}</h2>
                        <span class="sentiment-badge badge-note">Study Note</span>
                    </div>
                    <div class="rendered-markdown">${marked.parse(text)}</div>
                </article>
            `;
            
            document.querySelectorAll('.tree-item').forEach(el => el.classList.remove('active-link'));
            const target = document.getElementById(noteNodeRegistry[noteItem.filename]);
            if (target) target.classList.add('active-link');
            
            document.querySelector('.scrollable-body-container').scrollTop = 0;
        } catch (e) { container.innerHTML = `<p style="color:red; padding: 20px;">Error retrieving target reference asset file.</p>`; }
    }

    // Controls collapsible folders in sidebar tree
    function toggleView(id, headerEl) {
        const target = document.getElementById(id);
        if (!target) return;
        if (target.classList.contains('hidden')) {
            target.classList.remove('hidden');
            headerEl.classList.add('expanded');
        } else {
            target.classList.add('hidden');
            headerEl.classList.remove('expanded');
        }
    }

    document.addEventListener('DOMContentLoaded', initWorkspace);
</script>
</body>
</html>
