---
layout: default
---

<div class="journal-wrapper" style="font-family: sans-serif; max-width: 800px; margin: 0 auto; color: #1e293b;">
  
  <div class="nav-controls" style="margin-bottom: 30px; padding: 15px; background: #f1f5f9; border-radius: 8px;">
    <label for="dateSelect" style="font-weight: bold; margin-right: 10px;">Jump to Past Logs:</label>
    <select id="dateSelect" onchange="location = this.value;" style="padding: 6px; border-radius: 4px;">
      <option value="">-- Select a Date --</option>
      {% for post in site.posts %}
        <option value="{{ post.url }}">{{ post.date | date: "%B %d, %Y" }} - {{ post.sentiment }}</option>
      {% endfor %}
    </select>
  </div>

  {% assign latest_post = site.posts.first %}
  {% if latest_post %}
    <article class="log-entry" style="border: 1px solid #cbd5e1; border-radius: 12px; padding: 25px; background: #ffffff;">
      <div style="display: flex; justify-content: space-between; align-items: baseline; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; margin-bottom: 20px;">
        <h2 style="margin: 0; font-size: 1.5rem;">{{ latest_post.date | date: "%B %d, %Y" }}</h2>
        <span style="padding: 4px 12px; border-radius: 20px; font-weight: bold; background: #dcfce7; color: #166534;">
          {{ latest_post.sentiment }}
        </span>
      </div>

      <div class="entry-body" style="line-height: 1.7;">
        {{ latest_post.content }}
      </div>
    </article>
  {% else %}
    <p>No log entries found. Start adding markdown files to your _posts folder!</p>
  {% endif %}

</div>
