<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Sentiment & Strategy Log</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #f8fafc;
            --sidebar-bg: #1e293b;
            --sidebar-text: #cbd5e1;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --card-bg: #ffffff;
            --accent-blue: #3b82f6;
            --border-color: #cbd5e1;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
        }

        .dashboard-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background-color: var(--sidebar-bg);
            color: var(--sidebar-text);
            padding: 20px;
            border-right: 1px solid #334155;
            box-sizing: border-box;
        }

        .sidebar-header {
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #94a3b8;
            margin-bottom: 20px;
            border-bottom: 1px solid #334155;
            padding-bottom: 10px;
        }

        .tree-item {
            cursor: pointer;
            padding: 8px 10px;
            border-radius: 6px;
            display: block;
            margin-bottom: 4px;
            transition: background 0.2s;
            user-select: none;
            text-decoration: none;
        }

        .tree-item:hover {
            background-color: #334155;
            color: #fff;
        }

        .year-level { font-size: 1.05rem; font-weight: bold; }
        .month-level { font-size: 0.95rem; padding-left: 15px; color: #94a3b8; }
        .date-level { font-size: 0.9rem; padding-left: 25px; color: #38bdf8; }
        
        .date-level.active-link {
            background-color: var(--accent-blue);
            color: white !important;
            font-weight: bold;
        }

        .arrow {
            display: inline-block;
            font-size: 0.75rem;
            margin-right: 5px;
            transition: transform 0.2s;
        }

        .hidden { display: none; }
        .expanded > .arrow { transform: rotate(90deg); }
        .nested-group { padding-left: 5px; }

        .main-content {
            flex: 1;
            padding: 40px;
            max-width: 1100px;
            box-sizing: border-box;
        }

        .journal-header {
            margin-bottom: 40px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 15px;
        }

        .journal-header h1 {
            margin: 0;
            color: var(--text-main);
            font-size: 2rem;
        }

        .subtitle {
            margin: 5px 0 0 0;
            color: #eab308;
            font-size: 1.1rem;
            font-weight: 600;
            font-style: italic;
        }

        .log-entry {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
        }

        .entry-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .entry-header h2 { margin: 0; color: #1e293b; }

        .sentiment-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.85rem;
            background: #dcfce7; 
            color: #166534;
        }

        .entry-body {
            line-height: 1.8;
            color: #334155;
            font-size: 1.05rem;
        }

        .entry-body p { margin-bottom: 20px; }
        .entry-body h3 { color: var(--text-muted); font-size: 0.9rem; text-transform: uppercase; margin-top: 30px; margin-bottom: 10px; font-weight: bold; }
        .entry-body img { max-width: 100%; height: auto; border-radius: 8px; margin: 15px 0; display: block; border: 1px solid var(--border-color); }
        .entry-body a { color: var(--accent-blue); text-decoration: none; font-weight: 600; }
        .entry-body a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <aside class="sidebar">
        <div class="sidebar-header">Log Archive</div>
        <div class="archive-tree" id="archiveTree"></div>
    </aside>

    <main class="main-content">
        <header class="journal-header">
            <h1>Market Sentiment & Strategy Log</h1>
            <p class="subtitle">I am the best trader</p>
        </header>

        <div id="active-log-view"></div>
    </main>
</div>

<script>
    const monthOrder = {
        "January": 1, "February": 2, "March": 3, "April": 4, "May": 5, "June": 6,
        "July": 7, "August": 8, "September": 9, "October": 10, "November": 11, "December": 12
    };

    let safeNodeRegistry = {};

    async function initJournal() {
        try {
            const response = await fetch('feed.json?t=' + new Date().getTime());
            const logs = await response.json();
            
            buildTree(logs);
            if (logs.length > 0) {
                fetchAndRenderMarkdown(logs[0]);
            } else {
                document.getElementById('active-log-view').innerHTML = "<p>No diary entries found. Create files inside the 'diary' folder!</p>";
            }
        } catch (e) {
            document.getElementById('active-log-view').innerHTML = `<p style="color:red; padding: 20px;">Error fetching index feed template parameters.</p>`;
        }
    }

    function buildTree(logs) {
        const treeContainer = document.getElementById('archiveTree');
        let dataStructure = {};
        safeNodeRegistry = {};

        logs.forEach((log, index) => {
            const dayNum = parseInt(log.day, 10);
            if (!dataStructure[log.year]) dataStructure[log.year] = {};
            if (!dataStructure[log.year][log.month]) dataStructure[log.year][log.month] = [];
            dataStructure[log.year][log.month].push({ ...log, day: dayNum, registryIndex: index });
        });

        treeContainer.innerHTML = '';
        const sortedYears = Object.keys(dataStructure).sort((a, b) => b - a);

        sortedYears.forEach((year, yIdx) => {
            const yearId = `group-year-${year}`;
            const yearHeader = document.createElement('div');
            yearHeader.className = 'tree-item year-level';
            
            if (yIdx === 0) yearHeader.className += ' expanded';
            
            yearHeader.innerHTML = `<span class="arrow">▶</span> <strong>${year}</strong>`;
            yearHeader.onclick = () => toggleView(yearId, yearHeader);
            treeContainer.appendChild(yearHeader);

            const yearGroup = document.createElement('div');
            yearGroup.id = yearId;
            yearGroup.className = yIdx === 0 ? 'nested-group' : 'nested-group hidden';

            const sortedMonths = Object.keys(dataStructure[year]).sort((a, b) => (monthOrder[a] || 0) - (monthOrder[b] || 0));

            sortedMonths.forEach((month, mIdx) => {
                const monthId = `group-month-${year}-${month}`;
                const monthHeader = document.createElement('div');
                monthHeader.className = 'tree-item month-level';
                
                if (yIdx === 0 && mIdx === 0) monthHeader.className += ' expanded';
                
                monthHeader.innerHTML = `<span class="arrow">▶</span> ${month}`;
                monthHeader.onclick = (e) => { e.stopPropagation(); toggleView(monthId, monthHeader); };
                yearGroup.appendChild(monthHeader);

                const monthGroup = document.createElement('div');
                monthGroup.id = monthId;
                monthGroup.className = (yIdx === 0 && mIdx === 0) ? 'nested-group' : 'nested-group hidden';

                dataStructure[year][month].sort((a, b) => a.day - b.day);

                dataStructure[year][month].forEach(post => {
                    const dateLink = document.createElement('div');
                    dateLink.className = 'tree-item date-level';
                    
                    const internalLinkKey = `node-id-${post.registryIndex}`;
                    dateLink.id = internalLinkKey;
                    safeNodeRegistry[post.filename] = internalLinkKey;
                    
                    const formattedDay = post.day < 10 ? '0' + post.day : post.day;
                    dateLink.innerHTML = `📅 Day ${formattedDay}`;
                    
                    dateLink.onclick = (e) => {
                        e.stopPropagation();
                        fetchAndRenderMarkdown(post);
                    };
                    monthGroup.appendChild(dateLink);
                });
                yearGroup.appendChild(monthGroup);
            });
            treeContainer.appendChild(yearGroup);
        });
    }

    async function fetchAndRenderMarkdown(logItem) {
        const container = document.getElementById('active-log-view');
        try {
            // FIXED: Fetches directly from raw.githubusercontent.com to force immediate sync and bypass CDN delays completely
            const response = await fetch(`https://raw.githubusercontent.com/accypriyesh/accypriyesh.github.io/main/diary/${logItem.filename}?t=` + new Date().getTime());
            
            if (!response.ok) {
                throw new Error(`Server returned status layout parameters: ${response.status}`);
            }
            
            let text = await response.text();
            let markdownContent = text;

            if (text.trim().startsWith('---')) {
                markdownContent = text.replace(/^---[\s\S]*?---/, '');
            }

            container.innerHTML = `
                <article class="log-entry">
                    <div class="entry-header">
                        <h2>${logItem.month} ${logItem.day}, ${logItem.year}</h2>
                        <span class="sentiment-badge">${logItem.sentiment || 'Logged'}</span>
                    </div>
                    <div class="entry-body">${marked.parse(markdownContent)}</div>
                </article>
            `;

            document.querySelectorAll('.date-level').forEach(el => el.classList.remove('active-link'));
            const activeNodeId = safeNodeRegistry[logItem.filename];
            const targetNode = document.getElementById(activeNodeId);
            if (targetNode) targetNode.classList.add('active-link');

        } catch (e) {
            container.innerHTML = `<p style="color:red; padding: 20px;">Unable to display text body content. (Technical Details: ${e.message}).</p>`;
        }
    }

    function toggleView(id, headerEl) {
        const target = document.getElementById(id);
        if (!target) return;
        if (target.classList.contains('hidden')) {
            target.classList.remove('hidden');
            headerEl.classList.add('expanded');
        } else {
            target.classList.add('hidden');
            headerEl.classList.remove('expanded');
        }
    }

    document.addEventListener('DOMContentLoaded', initJournal);
</script>
</body>
</html>
